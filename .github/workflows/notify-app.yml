name: Notify prototype-playground

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger submodule update in prototype-playground
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.APP_REPO_TOKEN }}" \
            https://api.github.com/repos/stegel/prototype-playground/dispatches \
            -d '{"event_type": "prototypes-updated"}'
